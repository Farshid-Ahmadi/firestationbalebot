[Messages]
welcome = از آتش‌نشانی نورآباد ممسنی در خدمت شما هستیم. لطفاً یکی از موضوعات زیر را انتخاب کنید و مراحل را تا انتها طی کنید و یا اینکه با شماره تلفن ۱۲۵ تماس بگیرید:
cancel = بنا به خواست شما، ثبت گزارش لغو شد. شما میتوانید هر زمان که لازم شد، با کلیک بر 'شروع مجدد' در منو زیر، با ما در ارتباط باشید.
client_tag = تماس گیرنده
ask_contact = لطفاً با استفاده از دکمهٔ 'ارسال شماره تماس' شماره خود را ارسال نمایید.
criticism_text_tag = متن انتقاد یا پیشنهاد:
ask_text = لطفاً متن مورد نظر خود را بنویسید و ارسال نمایید:
incident_text_tag = شرح حادثه:
ask_incident_description = لطفاً شرح حادثه را بنویسید و ارسال نمایید و یا اینکه یکی از گزینه‌های زیر را انتخاب کنید:
received_data_tag = اطلاعات دریافت شده:
ask_approve = لطفاً در صورتی که اطلاعات صحیح است با استفاده از دکمهٔ زیر تأیید بفرمایید.
confirmation_of_receipt = پیام شما ثبت شد و به زودی بررسی خواهد شد.
address_tag = موقعیت یا آدرس:
ask_address = لطفاً لوکیشن خود را ارسال نمایید. درصوتی که امکان ارسال لوکیشن را ندارید آدرس دقیق را نوشته و ارسال کنید.
info = شما می‌توانید با کمک این ربات به آسانی با آتش‌نشانی نورآباد ممسنی در ارتباط باشید. برای این کار لازم است با استفاده از دکمهٔ 'شروع' یا 'شروع مجدد' ارتباطی را با ربات ما آغاز کنید و سپس مراحل را تا انتها پی بگیرید. با سپاس از تماس شما.

