[Subjects]
1 = 🔥 آتش‌سوزی
2 = 🚒 امداد و نجات
3 = 🏭 حادثهٔ صنعتی و فنی
4 = 🚨 سایر حوادث

[🔥 آتش‌سوزی]
1 = ساختمان کوچک بدون خطرات جانبی.
2 = ساختمان با گیر افتادن اشخاص در آتش.
3 = ساختمان بزرگ و یا با احتمال گسترش آتش.
4 = وسایل نقلیه بدون خطرات جانبی.
5 = وسایل نقلیه با احتمال خطر جانی.
6 = وسایل نقلیه با احتمال گسترش آتش.
7 = مزارع، باغات و یا فضای سبز.
8 = فلزات و یا مواد شیمیایی خاص.

[🚒 امداد و نجات]
1 = گیر افتادن در آسانسور و سایر موارد بدون خطر جانی.
2 = گیر افتادن در ارتفاع، بدون احتمال سقوط.
3 = گیر افتادن در ارتفاع با احتمال پریدن یا سقوط.
4 = گیر افتادن در زیر آوار یا سایر مخاطرات مشابه.
5 = رها سازی مصدومان در تصادفات جاده‌ای.

[🏭 حادثهٔ صنعتی و فنی]
1 = نشت سوخت و سایر مواد شیمیایی و خطرناک.
2 = آتش‌سوزی همزمان با نشت گاز شهری.
3 = آتش‌سوزی ترانسفورماتور و سایر تجهیزات برق شهری.
4 = حوادث فنی در کارخانه‌ها و کارگاه‌های بزرگ.

[🚨 سایر حوادث]
1 = مخاطرات مربوط به حیوانات درنده و یا سمی.
2 = استشمام بوی گاز و سایر مواد شیمیایی خطرناک.

